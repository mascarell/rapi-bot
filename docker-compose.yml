services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - WAIFUTOKEN=${WAIFUTOKEN}
      - CLIENTID=${CLIENTID}
      - WAIFUPORT=${WAIFUPORT}
      - CATAPI=${CATAPI}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    ports:
      - "${WAIFUPORT}:3000"
    volumes:
      - .:/app
    restart: unless-stopped

